{% extends "base.html" %}

{% block title %}เพิ่มรอบปลูก - ระบบจัดการฟาร์มผัก{% endblock %}

{% block content %}
<div class="form-container">
    <h1>เพิ่มรอบปลูก - {{ field.field_name }}</h1>
    
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="crop_name">ชื่อพืช:</label>
            <input type="text" id="crop_name" name="crop_name" required placeholder="เช่น มะเขือเทศ, ผักกาดหอม">
        </div>
        
        <div class="form-group">
            <label for="planting_date">วันที่ปลูก:</label>
            <input type="date" id="planting_date" name="planting_date" required>
        </div>
        
        <div class="form-group">
            <label for="estimated_harvest_date">วันที่คาดว่าจะเก็บเกี่ยว:</label>
            <input type="date" id="estimated_harvest_date" name="estimated_harvest_date" required>
        </div>
        
        <div class="form-group">
            <label for="quantity_planted">จำนวนที่ปลูก (กก.):</label>
            <input type="number" id="quantity_planted" name="quantity_planted" required step="0.01" placeholder="เช่น 50">
        </div>
        
        <div class="form-group">
            <label for="notes">หมายเหตุ:</label>
            <textarea id="notes" name="notes" rows="4" placeholder="เพิ่มหมายเหตุเพิ่มเติม..."></textarea>
        </div>
        
        <div class="form-buttons">
            <button type="submit" class="btn btn-primary">บันทึกรอบปลูก</button>
            <a href="{{ url_for('crop_management') }}" class="btn btn-secondary">ยกเลิก</a>
        </div>
    </form>
</div>
{% endblock %}
