{% extends "base.html" %}

{% block title %}เพิ่มแปลง - ระบบจัดการฟาร์มผัก{% endblock %}

{% block content %}
<div class="form-container">
    <h1>เพิ่มแปลงปลูกใหม่</h1>
    
    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
    
    <form method="POST" class="form">
        <div class="form-group">
            <label for="field_name">ชื่อแปลง:</label>
            <input type="text" id="field_name" name="field_name" required placeholder="เช่น แปลงเหนือนา">
        </div>
        
        <div class="form-group">
            <label for="field_area">ขนาดพื้นที่ (ตรม.):</label>
            <input type="number" id="field_area" name="field_area" required step="0.01" placeholder="เช่น 1000">
        </div>
        
        <div class="form-group">
            <label for="location">ตำแหน่ง:</label>
            <input type="text" id="location" name="location" required placeholder="เช่น อำเภอฟาร์ม">
        </div>
        
        <div class="form-buttons">
            <button type="submit" class="btn btn-primary">บันทึกแปลง</button>
            <a href="{{ url_for('crop_management') }}" class="btn btn-secondary">ยกเลิก</a>
        </div>
    </form>
</div>
{% endblock %}
